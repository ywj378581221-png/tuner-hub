services:
  - type: web
    name: tuner-hub
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: cd backend && gunicorn tunerhub.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tuner-hub-db
          property: connectionString
      - key: TUNERHUB_DEBUG
        value: "0"
      - key: TUNERHUB_SECRET_KEY
        generateValue: true
      - key: TUNERHUB_ALLOWED_HOSTS
        value: tuner-hub.onrender.com
      - key: TUNERHUB_CSRF_TRUSTED_ORIGINS
        value: https://tuner-hub.onrender.com
      - key: TUNERHUB_SECURE_SSL_REDIRECT
        value: "1"
      - key: TUNERHUB_HSTS_SECONDS
        value: "31536000"

databases:
  - name: tuner-hub-db
    plan: free
